version: "3.9"

services:
  # ========================
  # API Gateway - Caddy
  # ========================
  gateway:
    image: caddy:2-alpine
    container_name: ecommerce-gateway
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - chatbot-service
      - analytics-service
      - frontend
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Frontend - React
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=/api
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Shared PostgreSQL 17
  # ========================
  ecommerce-db:
    image: postgres:17-alpine
    container_name: ecommerce-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5444:5432"
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # User Service
  # ========================
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: ecommerce-user-service
    environment:
      - DATABASE_NAME=user_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-user-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
    volumes:
      - ./services/user-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Product Service
  # ========================
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: ecommerce-product-service
    environment:
      - DATABASE_NAME=product_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-product-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - USER_SERVICE_URL=http://user-service:8000
    volumes:
      - ./services/product-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Cart Service
  # ========================
  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    container_name: ecommerce-cart-service
    environment:
      - DATABASE_NAME=cart_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-cart-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
    volumes:
      - ./services/cart-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Order Service
  # ========================
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: ecommerce-order-service
    environment:
      - DATABASE_NAME=order_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-order-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000
    volumes:
      - ./services/order-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Payment Service
  # ========================
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: ecommerce-payment-service
    environment:
      - DATABASE_NAME=payment_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-payment-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - ORDER_SERVICE_URL=http://order-service:8000
      - USER_SERVICE_URL=http://user-service:8000
    volumes:
      - ./services/payment-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Chatbot Service (RAG)
  # ========================
  chatbot-service:
    build:
      context: ./services/chatbot-service
      dockerfile: Dockerfile
    container_name: ecommerce-chatbot-service
    environment:
      - DATABASE_NAME=chatbot_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-chatbot-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - USER_SERVICE_URL=http://user-service:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NEO4J_URI=bolt://neo4j-db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    volumes:
      - ./services/chatbot-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
      neo4j-db:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Analytics Service (Deep Learning)
  # ========================
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: ecommerce-analytics-service
    environment:
      - DATABASE_NAME=analytics_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-analytics-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000
    volumes:
      - ./services/analytics-service:/app
      - analytics_models:/app/ml_models
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Neo4j Graph Database
  # ========================
  neo4j-db:
    image: neo4j:5
    container_name: ecommerce-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

# ========================
# Volumes
# ========================
volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  neo4j_data:
  analytics_models:

# ========================
# Networks
# ========================
networks:
  ecommerce-network:
    driver: bridge

