version: "3.9"

services:
  # ========================
  # API Gateway - Django
  # ========================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ecommerce-api-gateway
    ports:
      - "8080:8000"
    environment:
      - SECRET_KEY=django-api-gateway-secret-key-2026
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - ORDER_SERVICE_URL=http://order-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://frontend:5173
      - PROXY_TIMEOUT=60
    volumes:
      - ./api-gateway:/app
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - ai-service
      - frontend
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Frontend - React
  # ========================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=/api
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Shared PostgreSQL 17
  # ========================
  ecommerce-db:
    image: postgres:17-alpine
    container_name: ecommerce-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5444:5432"
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # User Service
  # ========================
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: ecommerce-user-service
    environment:
      - DATABASE_NAME=user_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-user-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
    volumes:
      - ./user-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Product Service
  # ========================
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: ecommerce-product-service
    environment:
      - DATABASE_NAME=product_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-product-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - USER_SERVICE_URL=http://user-service:8000
    volumes:
      - ./product-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Cart Service
  # ========================
  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: ecommerce-cart-service
    environment:
      - DATABASE_NAME=cart_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-cart-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
    volumes:
      - ./cart-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Order Service
  # ========================
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: ecommerce-order-service
    environment:
      - DATABASE_NAME=order_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-order-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - CART_SERVICE_URL=http://cart-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000
    volumes:
      - ./order-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Payment Service
  # ========================
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: ecommerce-payment-service
    environment:
      - DATABASE_NAME=payment_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-payment-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - ORDER_SERVICE_URL=http://order-service:8000
      - USER_SERVICE_URL=http://user-service:8000
    volumes:
      - ./payment-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # AI Service (Behavior Analysis)
  # ========================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ecommerce-ai-service
    environment:
      - DATABASE_NAME=ai_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_HOST=ecommerce-db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-ai-secret-key-2026-ecommerce
      - DEBUG=1
      - ALLOWED_HOSTS=*
      - PRODUCT_SERVICE_URL=http://product-service:8000
      - USER_SERVICE_URL=http://user-service:8000
      - NEO4J_URI=bolt://neo4j-db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    ports:
      - "8004:8000"
    volumes:
      - ./ai-service:/app
    depends_on:
      ecommerce-db:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ========================
  # Neo4j Graph Database
  # ========================
  neo4j-db:
    image: neo4j:5
    container_name: ecommerce-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

# ========================
# Volumes
# ========================
volumes:
  postgres_data:
  neo4j_data:

# ========================
# Networks
# ========================
networks:
  ecommerce-network:
    driver: bridge

